Shield_of_the_Great_Trial:0 "Kazakhstan — The Shield of the Great Trial"
Shield_of_the_Great_Trial_desc:0 "The Great Trial has engulfed the world, and Kazakhstan stands at the crossroads of annihilation and survival. Nursultan Nazarbayev has emerged as the steward of a battered nation, balancing the demands of Omsk with the realities of the steppe. While the Black League demands absolute militarization, Nazarbayev understands that a state cannot wage war forever without bread, fuel, and industry. Under his guidance, Kazakhstan has become a fortress of discipline and production—a vital rear area for the coming struggle.\n\nMany accuse him of weakness, others of blind obedience. Yet while radicals dream of glory and vengeance, Nazarbayev ensures that the trains run, the mines operate, and the people endure. In an age of fanatics, survival itself has become an act of defiance."
infection_of_tunnel_systems:0 "Infection of tunnel systems"
omsk_economy:0 "Omsk economy"
# omsk_economy_desc:0 "Civilian comfort, scientific progress and political freedoms are secondary concerns. Every factory, every worker and every resource serves a single purpose: preparation for the final war."
army_Great_Trial:0 "Army of Vengeance"
army_Great_Trial_desc:0 "§RThe Great Trial was delayed, not defeated.§!\n\nThe Army has become the living embodiment of national vengeance. It is not motivated by glory, wealth, or conquest. It marches for the dead. It trains for the fallen. It fights for those who can no longer fight for themselves.\n\nBorn from the collapse of the Soviet remnant and the rot of a fascist victory in Europe, this army exists for one purpose: vengeance. The Steel Pact will be broken, and every mile taken from them will be paid for in blood, steel, and silence. No mercy. No compromise. No future until the enemy is gone.\n\nThe coming war will not be fought for territory. It will be fought for justice, memory, and retribution."
death_teutonic_slava_ukraine:0 "Death teuton - slava Ukraine and League"



#puppet

legacy_of_the_great_trial:0 "Legacy of the Great Trial"
legacy_of_the_great_trial_desc:0 "Germany has been defeated, the ashes of our enemies scattered to the wind, but the Black League does not know how to build peace. Luxembourg has become the heart of a new, emasculated Europe, transformed into one giant fortified zone. We have won, but the war is not over—it has simply become our eternal way of life. Now our task is to squeeze every last drop of resources from this continent to ensure that the Teutonic threat never rises again from the ruins."